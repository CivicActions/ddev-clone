name: Addon Update Checker
on:
  schedule:
    - cron: '0 12 * * 1'
  push:
    branches: [main]
    paths:
      - install.yaml
      - commands/**
      - tests/**
      - README.md
      - LICENSE
      - .gitattributes
      - .github/**
  pull_request:
    paths:
      - install.yaml
      - commands/**
      - tests/**
      - README.md
      - LICENSE
      - .gitattributes
      - .github/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-checker:
    name: DDEV Addon Best Practices Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run DDEV addon update checker
        run: curl -fsSL https://ddev.com/s/addon-update-checker.sh | bash
