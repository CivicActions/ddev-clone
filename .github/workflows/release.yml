name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ">=1.24"
          check-latest: true

      - name: Run tests
        run: go test -v -race ./pkg/... ./cmd/...

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            OS="${platform%/*}"
            ARCH="${platform#*/}"
            EXT=""
            if [ "$OS" = "windows" ]; then EXT=".exe"; fi

            BINARY="ddev-clone${EXT}"
            TARBALL="ddev-clone_${OS}_${ARCH}.tar.gz"

            echo "Building ${OS}/${ARCH}..."
            CGO_ENABLED=0 GOOS="$OS" GOARCH="$ARCH" \
              go build -ldflags "$LDFLAGS" -o "$BINARY" .

            tar -czf "dist/${TARBALL}" "$BINARY"
            rm -f "$BINARY"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if echo "${{ steps.version.outputs.VERSION }}" | grep -qiE '(alpha|beta|rc)'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ steps.version.outputs.VERSION }}" \
            dist/ddev-clone_*.tar.gz dist/checksums.txt \
            --generate-notes $PRERELEASE_FLAG
